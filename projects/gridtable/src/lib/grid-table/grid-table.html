<div class="grid-table" [style.grid-template-columns]="gridTemplateColumns()" [style.max-width]="maxWidth()" [style.max-height]="maxHeight()">
  <!-- Headers -->
  @for (col of columns(); track $index) {
    <div class="grid-table-header">
      @if (col.headerTemplate()) {
        <ng-container [ngTemplateOutlet]="col.headerTemplate()!"></ng-container>
      } @else {
        {{ col.attribute() }}
      }
    </div>
  }

  <!-- Rows -->
  @for (row of values(); track $index; let rowIndex = $index) {
    @for (col of columns(); track $index) {
      <div class="grid-table-cell">
        @if (col.rowTemplate()) {
          <ng-container [ngTemplateOutlet]="col.rowTemplate()!" [ngTemplateOutletContext]="{ $implicit: row, index: rowIndex }"></ng-container>
        } @else {
          {{ row[col.attribute()!] }}
        }
      </div>
    }
  }

  <ng-content select="lib-grid-table-footer"></ng-content>
</div>
